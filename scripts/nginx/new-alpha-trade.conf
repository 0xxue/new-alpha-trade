# new-alpha-trade nginx 配置（HTTPS + Basic Auth）
#
# 部署到 /etc/nginx/sites-available/new-alpha-trade
#
# 前置：certbot 已签 example.com 证书到 /etc/letsencrypt/live/example.com/
# 如果证书不存在，先用 install-server.sh 的 HTTP-only 版本起 nginx，
# 然后 certbot certonly --webroot -w /var/www/certbot -d example.com -d www.example.com
#
# 路由分配：
#   /                       -> web-ui dist 静态（Basic Auth）
#   /api/qr/*               -> qr-service :7001（Basic Auth）
#   /api/*                  -> trading-engine :7002（Basic Auth）
#   /ws/*                   -> trading-engine :7002 (Upgrade)（Basic Auth）
#   /api/health             -> trading-engine :7002（**不要** Auth，监控用）
#   /api/qr/health          -> qr-service :7001（**不要** Auth）
#   /.well-known/acme-challenge/  -> certbot 续期挑战目录（**不要** Auth）

# ============================ HTTP 80：ACME 挑战 + 强制重定向到 HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name example.com www.example.com;

    # certbot 续期必须留这个 path
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # 其它一切 301 跳 HTTPS（用 server_name 防止跳到错误 host，比如旧 DNS 缓存命中其它 host 时）
    location / {
        return 301 https://example.com$request_uri;
    }
}

# ============================ HTTPS 443：主服务
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;
    client_max_body_size 8m;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ============================== 全局 Basic Auth（其它 location 继承，例外手动 off）
    auth_basic "new-alpha-trade";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ============================== 健康检查（不要 Auth，给监控）
    location = /api/health {
        auth_basic off;
        proxy_pass http://127.0.0.1:7002/health;
        proxy_set_header Host $host;
    }
    location = /api/qr/health {
        auth_basic off;
        proxy_pass http://127.0.0.1:7001/health;
        proxy_set_header Host $host;
    }

    # ============================== 前端静态
    root /opt/new-alpha-trade/web-ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ============================== qr-service
    location /api/qr/ {
        rewrite ^/api/qr/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:7001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ============================== trading-engine REST
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:7002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ============================== trading-engine WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:7002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
